name: Deploy crossover flip board

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify site files
        run: test -f index.html && test -f data/rows.json && test -f data/watchlists.json

      # Chart cache (~280MB, 5000+ files) exceeds GitHub artifact limits — deploy without it.
      # Static site uses Yahoo via chart-closes fallback when cache missing.
      - name: Stage site (exclude chart cache)
        run: |
          mkdir -p _site
          rsync -a             --exclude 'data/charts'             --exclude '.git'             --exclude '_site'             --exclude 'node_modules'             ./ _site/
          touch _site/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - uses: actions/deploy-pages@v4
        id: deployment
